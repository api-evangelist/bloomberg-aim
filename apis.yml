aid: bloomberg-aim
name: Bloomberg AIM
description: >-
  Bloomberg's Asset and Investment Manager (AIM) is a comprehensive buy-side
  solution offering global, multi-asset capabilities for portfolio management,
  trading, compliance, and operations. Bloomberg provides a suite of developer
  APIs including BLPAPI, Server API, and the Hypermedia API for programmatic
  access to market data, analytics, and enterprise services.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Financial Data
  - Market Data
  - Order Management
  - Portfolio Management
  - Trading
url: >-
  https://raw.githubusercontent.com/api-evangelist/bloomberg-aim/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: bloomberg-aim:bloomberg-data-license-api
    name: Bloomberg Data License API
    description: >-
      Provides programmatic access to Bloomberg's comprehensive financial,
      pricing, reference, regulatory, and alternative data covering over 50
      million securities and 56,000 fields via the Hypermedia API (HAPI).
    humanURL: https://www.bloomberg.com/professional/products/data/data-management/data-license/
    tags:
      - Market Data
      - Pricing Data
      - Reference Data
      - Financial Data
    properties:
      - type: Documentation
        url: https://www.bloomberg.com/professional/support/api-library/
      - type: Authentication
        url: https://console.bloomberg.com/about/82
  - aid: bloomberg-aim:bloomberg-server-api
    name: Bloomberg Server API (SAPI)
    description: >-
      Server API delivers real-time market data, historical data, premium
      reference data, and calculation tools from the Bloomberg Terminal into
      front-office applications.
    humanURL: https://www.bloomberg.com/professional/products/data/data-connectivity/server-api/
    tags:
      - Server API
      - Market Data
      - Real-Time Data
      - Financial Analytics
    properties:
      - type: Documentation
        url: https://bloomberg.github.io/blpapi-docs/
  - aid: bloomberg-aim:bloomberg-emsx-api
    name: Bloomberg EMSX API
    description: >-
      The Execution Management System API allows developers to manage and
      automate trading for equities, futures, and options.
    humanURL: https://www.bloomberg.com/professional/products/trading/execution-management-system/
    tags:
      - Execution Management
      - Trading
      - Order Management
      - Equities
    properties:
      - type: Documentation
        url: https://emsx-api-doc.readthedocs.io/
